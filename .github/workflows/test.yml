name: Run Relief-Based Selector Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-update-conda: true
          activate-environment: testenv
          environment-file: environment.yml
          python-version: 3.9  # or use a matrix strategy for multiple versions

      - name: Show environment details
        run: |
          which python
          python --version
          conda list

      - name: Install package and pytest
        run: |
          pip install -e .
          pip install pytest

      - name: Run tests
        run: |
          pytest test.py -v
